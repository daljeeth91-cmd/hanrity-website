<!DOCTYPE html>
<html>
<head>
  <title>HanRity Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-box">
  <h2>HanRity Login</h2>

  <input type="text" id="username" placeholder="Enter Username">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <p id="error"></p>
</div>

<script src="script.js"></script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HanRity Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>HanRity</h2>

    <ul>
      <li>📅 Schedule</li>
      <li>📊 Progress</li>
      <li>💬 Messages</li>
      <li>⚙ Settings</li>
    </ul>

    <button class="logout">Log out</button>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Header -->
    <div class="topbar">
      <input type="text" placeholder="Search...">
      <div class="profile">👤 User</div>
    </div>

    <!-- Banner -->
    <div class="banner">
      <h2>Effective Education</h2>
      <p>Learn. Grow. Earn with HanRity</p>
    </div>

    <!-- Cards -->
    <div class="cards">

      <div class="card">
        <h3>AI & ChatGPT</h3>
        <p>Master AI tools</p>
      </div>

      <div class="card">
        <h3>Freelancing</h3>
        <p>Start earning</p>
      </div>

      <div class="card">
        <h3>Design</h3>
        <p>Create visuals</p>
      </div>

    </div>

    <!-- Progress -->
    <div class="progress-box">
      <h3>Your Progress</h3>
      <div class="bar"><span style="width:70%"></span></div>
      <div class="bar"><span style="width:50%"></span></div>
    </div>

  </div>

</div>

</body>
</html>
